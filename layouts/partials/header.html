{{ $isBlog := eq .Section "blog" }}
<header
    id="site-header"
    class="fixed top-0 left-0 right-0 z-50 w-full px-4 pt-4 md:pt-6"
>
    {{ if $isBlog }}
    <div
        class="w-full max-w-7xl mx-auto rounded-[28px] border border-white/10 bg-[#0d1018]/85 backdrop-blur-2xl shadow-[0_18px_50px_rgba(0,0,0,0.28)] px-4 py-3 md:px-6"
    >
        <div class="flex items-center justify-between gap-4">
            <div class="flex min-w-0 items-center gap-3 md:gap-5">
                <a
                    href="/"
                    class="inline-flex items-center gap-2 text-[11px] uppercase tracking-[0.28em] text-[#9aaabb] hover:text-[#5eead4] transition-colors"
                >
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    На главную
                </a>
                <span class="hidden md:inline-block h-5 w-px bg-white/10"></span>
                <span class="hidden md:inline text-[10px] uppercase tracking-[0.24em] text-[#6b7a90]">
                    Аналитика и статьи о рынке вагонов
                </span>
            </div>

            <div class="flex flex-col items-center justify-center">
                <a
                    href="/blog/"
                    class="blog-display text-xl md:text-2xl font-bold uppercase tracking-[0.28em] text-[#f0f2f5] hover:text-white transition-colors"
                >
                    <span class="text-[#5eead4]">ПРО</span>ВАГОН
                </a>
                <span class="text-[9px] uppercase tracking-[0.28em] text-[#6b7a90]">
                    Blog / Knowledge Base
                </span>
            </div>

            <div class="header-actions flex items-center gap-2 md:gap-3">
                <a
                    href="/"
                    class="inline-flex items-center gap-2 rounded-lg border border-white/10 bg-white/5 px-3 py-1.5 text-[10px] uppercase tracking-[0.18em] text-[#9aaabb] transition-all hover:border-[#5eead4]/30 hover:text-[#5eead4]"
                >
                    <i data-lucide="layout-grid" class="w-3 h-3"></i>
                    <span class="hidden md:inline">Каталог</span>
                </a>
                <a
                    href="mailto:info@provagon.ru"
                    class="inline-flex h-[30px] w-[30px] items-center justify-center rounded-lg bg-[#93c5fd] text-[#0a0c12] shadow-[0_10px_24px_rgba(147,197,253,0.24)] transition-all hover:-translate-y-px hover:shadow-[0_14px_28px_rgba(147,197,253,0.32)]"
                    aria-label="Написать на почту"
                >
                    <i data-lucide="mail" class="w-3 h-3"></i>
                </a>
                <a
                    href="tel:+79094000027"
                    class="inline-flex h-[30px] w-[30px] items-center justify-center rounded-lg bg-[#5eead4] text-[#0a0c12] shadow-[0_10px_24px_rgba(94,234,212,0.22)] transition-all hover:-translate-y-px hover:shadow-[0_14px_28px_rgba(94,234,212,0.3)]"
                    aria-label="Позвонить"
                >
                    <i data-lucide="phone" class="w-3 h-3"></i>
                </a>
            </div>
        </div>
    </div>
    {{ else }}
    <div
        class="relative flex flex-col md:flex-row items-center justify-center md:justify-end gap-3 md:gap-8 bg-white/50 backdrop-blur-xl rounded-2xl md:rounded-3xl shadow-lg border border-white/20 p-3 md:px-6 w-full max-w-7xl mx-auto"
    >
        <div class="md:absolute md:left-1/2 md:top-1/2 md:-translate-x-1/2 md:-translate-y-1/2 flex flex-col items-center">
            <a
                href="/"
                class="text-3xl md:text-4xl font-black tracking-tighter text-zinc-900 hover:opacity-90 transition-opacity"
            >
                VAGON<span class="text-[#318b5d]">AI</span>
            </a>
            <p
                class="hidden md:block text-[8px] uppercase tracking-[0.3em] font-bold text-zinc-600 mt-1"
            >
                ИИ-агент по прямым продажам грузовых вагонов от завода
            </p>
        </div>

        <div class="header-actions flex items-center gap-2 md:gap-3">
            <a
                href="/blog/"
                class="inline-flex items-center gap-2 rounded-xl bg-white/60 px-3 py-2 text-[11px] font-semibold uppercase tracking-[0.18em] text-zinc-700 border border-black/10 transition-all hover:bg-white hover:text-[#318b5d]"
            >
                <i data-lucide="newspaper" class="w-4 h-4"></i>
                <span class="hidden md:inline">Блог</span>
            </a>
            <button
                id="history-btn"
                class="p-2 bg-white/50 hover:bg-white rounded-xl transition-all text-zinc-700 hover:text-[#318b5d] border border-black/10"
            >
                <i data-lucide="clock" class="w-4 h-4"></i>
            </button>
            <a
                href="mailto:info@vagonai.ru"
                class="p-2 bg-white/50 hover:bg-white rounded-xl transition-all text-zinc-700 hover:text-[#318b5d] border border-black/10 flex items-center justify-center"
            >
                <i data-lucide="mail" class="w-4 h-4"></i>
            </a>
            <a
                href="tel:+79094000027"
                class="p-2 bg-[#318b5d] text-white rounded-xl hover:bg-[#3b82f6] transition-all shadow-sm shadow-[#318b5d]/20 flex items-center justify-center"
            >
                <i data-lucide="phone" class="w-4 h-4"></i>
            </a>
        </div>
    </div>
    {{ end }}
</header>
