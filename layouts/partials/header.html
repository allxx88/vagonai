<header
    id="site-header"
    class="fixed top-0 left-0 right-0 z-50 w-full px-4 pt-4 md:pt-6"
>
    <div
        class="relative flex flex-col md:flex-row items-center justify-center md:justify-end gap-3 md:gap-8 bg-white/50 backdrop-blur-xl rounded-2xl md:rounded-3xl shadow-lg border border-white/20 p-3 md:px-6 w-full max-w-7xl mx-auto"
    >
        <!-- Logo and Subtitle (Centered) -->
        <div class="md:absolute md:left-1/2 md:top-1/2 md:-translate-x-1/2 md:-translate-y-1/2 flex flex-col items-center">
            <a
                href="/"
                class="text-3xl md:text-4xl font-black tracking-tighter text-zinc-900 hover:opacity-90 transition-opacity"
            >
                VAGON<span class="text-[#318b5d]">AI</span>
            </a>
            <p
                class="hidden md:block text-[8px] uppercase tracking-[0.3em] font-bold text-zinc-600 mt-1"
            >
                ИИ-агент по прямым продажам грузовых вагонов от завода
            </p>
        </div>

        <!-- Actions -->
        <div class="header-actions flex items-center gap-2 md:gap-3">
            <button
                id="history-btn"
                class="p-2 bg-white/50 hover:bg-white rounded-xl transition-all text-zinc-700 hover:text-[#318b5d] border border-black/10"
            >
                <i data-lucide="clock" class="w-4 h-4"></i>
            </button>
            <a
                href="mailto:info@vagonai.ru"
                class="p-2 bg-white/50 hover:bg-white rounded-xl transition-all text-zinc-700 hover:text-[#318b5d] border border-black/10 flex items-center justify-center"
            >
                <i data-lucide="mail" class="w-4 h-4"></i>
            </a>
            <a
                href="tel:+79094000027"
                class="p-2 bg-[#318b5d] text-white rounded-xl hover:bg-[#3b82f6] transition-all shadow-sm shadow-[#318b5d]/20 flex items-center justify-center"
            >
                <i data-lucide="phone" class="w-4 h-4"></i>
            </a>
        </div>
    </div>
</header>
