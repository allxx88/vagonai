<!DOCTYPE html>
<html lang="ru-ru">
  <head>
    <title>https://provagon.ru/blog/</title>
    <link rel="canonical" href="https://provagon.ru/blog/">
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0; url=https://provagon.ru/blog/">
  <style>

    .price-popup-toggle {
        position: fixed;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
    }
    .price-popup-overlay {
        position: fixed;
        inset: 0;
        z-index: 9000;
        background: rgba(3, 7, 18, 0.68);
        backdrop-filter: blur(7px);
        -webkit-backdrop-filter: blur(7px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.28s ease;
    }
    .price-popup-overlay.is-visible {
        opacity: 1;
        pointer-events: auto;
    }
    .price-popup {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 9001;
        width: min(560px, calc(100vw - 2rem));
        min-height: 360px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 28px;
        background:
            linear-gradient(135deg, rgba(8, 11, 18, 0.86), rgba(8, 11, 18, 0.52)),
            url("/images/wagons/poluvagon.png");
        background-size: cover;
        background-position: center;
        box-shadow:
            0 28px 70px rgba(0, 0, 0, 0.35),
            0 0 0 1px rgba(49, 139, 93, 0.16);
        color: #ffffff;
        opacity: 0;
        transform: translate(-50%, -46%) scale(0.96);
        pointer-events: none;
        transition:
            opacity 0.28s ease,
            transform 0.28s ease;
    }
    .price-popup.is-visible {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        pointer-events: auto;
    }
    .price-popup-toggle:checked ~ .price-popup-overlay {
        animation: price-popup-overlay-show 0.28s ease 5s forwards;
    }
    .price-popup-toggle:checked ~ .price-popup {
        animation: price-popup-show 0.28s ease 5s forwards;
    }
    .price-popup-toggle:not(:checked) ~ .price-popup-overlay,
    .price-popup-toggle:not(:checked) ~ .price-popup {
        animation: none;
    }
    .price-popup::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
            radial-gradient(circle at 18% 10%, rgba(94, 234, 212, 0.2), transparent 34%),
            linear-gradient(180deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.62));
        pointer-events: none;
    }
    .price-popup__content {
        position: relative;
        display: flex;
        min-height: 360px;
        flex-direction: column;
        justify-content: flex-end;
        padding: clamp(1.35rem, 4vw, 2rem);
    }
    .price-popup__close {
        position: absolute;
        top: 0.85rem;
        right: 0.85rem;
        display: inline-flex;
        width: 34px;
        height: 34px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.14);
        color: #ffffff;
        cursor: pointer;
        font-size: 24px;
        line-height: 1;
    }
    .price-popup__eyebrow {
        display: inline-flex;
        width: fit-content;
        margin-bottom: 0.65rem;
        border-radius: 999px;
        background: rgba(94, 234, 212, 0.16);
        padding: 0.35rem 0.65rem;
        color: #b6fff2;
        font-size: 0.66rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
    }
    .price-popup__title {
        max-width: 25rem;
        margin: 0 0 1.15rem;
        font-family: var(--font-display);
        font-size: clamp(2rem, 6vw, 3.15rem);
        font-weight: 800;
        line-height: 1.02;
        letter-spacing: 0;
        text-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
    }
    .price-popup__button,
    .price-popup__secondary {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        color: #ffffff;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        user-select: none;
    }
    .price-popup__button {
        gap: 0.55rem;
        background: #ef233c;
        padding: 0.85rem 1rem;
        box-shadow:
            0 16px 34px rgba(239, 35, 60, 0.38),
            inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }
    .price-popup__secondary {
        margin-top: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.12);
        padding: 0.72rem 0.95rem;
    }
    @media (max-width: 640px) {
        .price-popup {
            width: calc(100vw - 2rem);
            min-height: 320px;
            border-radius: 22px;
        }
        .price-popup__content {
            min-height: 320px;
        }
        .price-popup__title {
            max-width: 17rem;
        }
    }
    @keyframes price-popup-overlay-show {
        to {
            opacity: 1;
            pointer-events: auto;
        }
    }
    @keyframes price-popup-show {
        to {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }
    }

</style>
</head>
</html>
